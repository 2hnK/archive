<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${title}, ${description}, ~{::main})}">
<body>
<main class="w-full min-h-screen pt-[20vh] pb-32 px-6 md:px-12 lg:px-24">
  <section class="max-w-7xl mx-auto mb-32 md:mb-48 reveal-up">
    <div class="flex flex-col gap-2 md:gap-0">
      <h1
        class="text-[10vw] md:text-[6vw] font-serif font-black leading-[0.8] tracking-tighter uppercase text-transparent !bg-clip-text bg-gradient-to-r from-neutral-900 to-neutral-500 dark:from-neutral-100 dark:to-neutral-500">
        ARCHIVING
      </h1>
      <div class="flex items-center gap-4 md:gap-12 ml-[10vw]">
        <span class="block w-12 md:w-32 h-[2px] bg-accent-color md:mt-2"></span>
        <h1 class="text-[10vw] md:text-[6vw] font-serif font-black leading-[0.8] tracking-tighter uppercase">
          CODE &
        </h1>
      </div>
      <h1 class="text-[10vw] md:text-[6vw] font-serif font-black leading-[0.8] tracking-tighter uppercase text-right mr-[5vw] italic">
        EXPERIENCE.
      </h1>
    </div>

    <div class="mt-16 md:mt-24 max-w-xl ml-auto border-l border-accent-color pl-6 reveal-up stagger-1">
      <p class="text-lg md:text-xl font-sans font-medium opacity-80 leading-relaxed">
        An archive of code, thoughts, experience and growth.
      </p>
    </div>
  </section>

  <section class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-24">
    <div class="reveal-up">
      <div class="flex justify-between items-end mb-12">
        <h2 class="text-4xl font-serif font-bold tracking-tight">Articles</h2>
        <a href="/articles" class="artistic-link uppercase tracking-widest text-xs font-bold font-sans">View All</a>
      </div>

      <div class="editorial-list">
        <a th:each="article : ${latestArticles}"
           th:href="${article.url()}"
           class="editorial-list-item group block py-8 px-4 cursor-pointer reveal-up stagger-1">
          <div class="flex justify-between items-center gap-4">
            <div class="flex flex-col gap-1.5">
              <h3 class="text-3xl font-serif font-bold tracking-tighter group-hover:text-inherit transition-colors duration-300"
                  th:text="${article.title}">Article Title</h3>
              <div class="flex items-center gap-3 text-sm font-sans opacity-60">
                <span th:text="${article.description}">Article description</span>
              </div>
            </div>
            <div class="flex items-center gap-4 shrink-0">
              <span class="text-xs font-sans font-bold uppercase tracking-widest opacity-40"
                    th:text="${article.dateLabel()}">2026-01-01</span>
              <span class="material-symbols-outlined text-xl editorial-list-arrow">arrow_forward</span>
            </div>
          </div>
        </a>
      </div>
    </div>

    <div class="reveal-up stagger-1 md:mt-32">
      <div class="flex justify-between items-end mb-12">
        <h2 class="text-4xl font-serif font-bold tracking-tight">Works</h2>
        <a href="/project" class="artistic-link uppercase tracking-widest text-xs font-bold font-sans">View All</a>
      </div>

      <div class="editorial-list">
        <a th:each="project : ${projects}"
           th:href="${project.url()}"
           class="editorial-list-item group block py-8 px-4 cursor-pointer reveal-up stagger-2">
          <div class="flex justify-between items-center gap-4">
            <div class="flex flex-col gap-1.5">
              <h3 class="text-3xl font-serif font-bold tracking-tighter group-hover:text-inherit transition-colors duration-300"
                  th:text="${project.title}">Project</h3>
              <span class="text-sm font-sans opacity-60" th:text="${project.description}">Project description</span>
            </div>
            <div class="flex items-center gap-4 shrink-0">
              <span class="text-xs font-sans font-bold uppercase tracking-widest opacity-40"
                    th:text="${project.year}">2026</span>
              <span class="material-symbols-outlined text-xl editorial-list-arrow">arrow_forward</span>
            </div>
          </div>
        </a>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const revealObserver = new IntersectionObserver(
        (entries, observer) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("active");
              observer.unobserve(entry.target);
            }
          });
        },
        { root: null, rootMargin: "0px 0px -50px 0px", threshold: 0.1 },
      );

      document.querySelectorAll(".reveal-up").forEach((el) => revealObserver.observe(el));
    });
  </script>
</main>
</body>
</html>
