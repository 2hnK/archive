<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, pageDescription, content)">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title th:text="${pageTitle ?: 'DevArchive'}">DevArchive</title>
  <meta name="description" th:content="${pageDescription ?: '예술적이고 창의적인 개발 기록'}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css(v='20260716-3')}">
  <script>
    function applyTheme() {
      const theme = (() => {
        if (typeof localStorage !== "undefined" && localStorage.getItem("theme")) {
          return localStorage.getItem("theme");
        }
        if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          return "dark";
        }
        return "light";
      })();
      if (theme === "light") {
        document.documentElement.classList.remove("dark");
      } else {
        document.documentElement.classList.add("dark");
      }
      window.localStorage.setItem("theme", theme);
    }
    applyTheme();
  </script>
</head>
<body class="antialiased selection:bg-[#1a1a1a] selection:text-[#EAE6D7] dark:selection:bg-[#f4f0db] dark:selection:text-[#0f0f0f] flex flex-col min-h-screen relative">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="flex-grow z-10 relative" th:insert="${content}"></div>
  <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
