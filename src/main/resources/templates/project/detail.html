<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(${title}, ${description}, ~{::main})}">
<body>
<main class="w-full min-h-screen pt-[18vh] pb-32 px-6 md:px-12 lg:px-24">
  <div class="max-w-[1400px] mx-auto">
    <nav class="mb-20 reveal-up flex justify-between items-center">
      <a
        href="/project"
        class="group inline-flex items-center gap-3 text-[10px] font-sans uppercase tracking-[0.2em] font-bold opacity-60 hover:opacity-100 transition-all">
        <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
        Back to Archives
      </a>
    </nav>

    <header class="mb-24 reveal-up stagger-1">
      <div class="flex flex-wrap items-center gap-2 mb-10">
        <span
          class="glass-pill px-4 py-1 text-[10px] font-bold border border-text-color/10 opacity-60 uppercase tracking-widest"
          th:text="|${project.year} Edition|">2026 Edition</span>
      </div>

      <h1
        class="text-6xl md:text-[9.5rem] font-serif font-black tracking-tighter leading-[0.85] mb-12 break-keep reveal-up stagger-2"
        th:text="${project.title}">
        Project
      </h1>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-end reveal-up stagger-3">
        <p class="lg:col-span-8 text-xl md:text-2xl font-serif opacity-80 leading-relaxed tracking-tight break-keep py-4 border-l-4 border-accent-color pl-8"
           th:text="${project.description}">
          Description
        </p>
      </div>
    </header>

    <section class="mb-16 reveal-up stagger-4">
      <div class="relative overflow-hidden rounded-[2.2rem] md:rounded-[3rem] border border-black/10 dark:border-white/10 shadow-[0_30px_70px_-15px_rgba(0,0,0,0.2)] dark:shadow-[0_45px_100px_-20px_rgba(0,0,0,0.65)] bg-black/5 flex items-center justify-center transition-all duration-700 hover:shadow-accent-color/5">
        <video th:if="${project.video != null}" controls playsinline class="w-full h-auto max-h-[80vh] block">
          <source th:src="${project.video}" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <img th:if="${project.video == null}"
             th:src="${project.image}"
             th:alt="${project.title}"
             class="w-full h-full object-cover grayscale-[0.3] hover:grayscale-0 scale-105 hover:scale-100 transition-all duration-1000 ease-out">
      </div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-12 gap-20">
      <aside class="lg:col-span-4 reveal-up order-2 lg:order-1">
        <div class="sticky top-32 flex flex-col gap-12">
          <div>
            <h4 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6 border-b border-text-color/10 pb-2">
              Core Categories
            </h4>
            <div class="flex flex-wrap gap-2">
              <span th:each="tag : ${project.tags}"
                    th:text="${tag}"
                    class="border border-text-color/10 rounded-full px-4 py-1 text-[10px] uppercase font-sans font-bold tracking-widest opacity-60">
                Tag
              </span>
            </div>
          </div>
          <div>
            <h4 class="text-xs font-black uppercase tracking-[0.3em] opacity-40 mb-6 border-b border-text-color/10 pb-2">
              Archival Note
            </h4>
            <p class="text-sm font-sans leading-relaxed opacity-60 break-keep"
               th:text="${project.archivalNote}">
              Note
            </p>
          </div>
          <div class="pt-8 opacity-20">
            <span class="material-symbols-outlined text-6xl">all_inclusive</span>
          </div>
        </div>
      </aside>

      <div class="lg:col-span-8 reveal-up stagger-1 order-1 lg:order-2">
        <article class="prose prose-lg dark:prose-invert max-w-none prose-headings:font-serif prose-headings:tracking-tighter prose-p:leading-relaxed prose-p:text-text-color/80"
                 th:utext="${project.content}">
        </article>

        <div class="mt-32 pt-16 border-t border-text-color/10 flex justify-between items-center">
          <div class="text-[10px] font-black uppercase tracking-[0.3em] opacity-30">
            End of Record
          </div>
          <a href="/project" class="text-xs font-bold uppercase tracking-widest hover:text-accent-color transition-colors">
            Return to Showcase →
          </a>
        </div>
      </div>
    </section>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const revealObserver = new IntersectionObserver(
        (entries, observer) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("active");
              observer.unobserve(entry.target);
            }
          });
        },
        { root: null, rootMargin: "0px 0px 150px 0px", threshold: 0.05 },
      );

      document.querySelectorAll(".reveal-up").forEach((el) => revealObserver.observe(el));
    });
  </script>
</main>
</body>
</html>
