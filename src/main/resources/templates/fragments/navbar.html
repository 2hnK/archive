<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<header
  th:fragment="navbar"
  id="main-nav"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-700 ease-out border-b border-black/5 dark:border-white/10
         bg-[rgba(255,255,255,0.3)] dark:bg-[rgba(15,15,15,0.3)]
         backdrop-blur-[32px] backdrop-saturate-[200%]
         -webkit-backdrop-blur-[32px]">
  <div class="relative flex h-16 px-6 md:px-12 lg:px-24 w-full items-center">
    <div class="z-10 flex text-xl font-serif font-bold tracking-tight text-text-color uppercase">
      <a href="/">DEVARCHIVE</a>
    </div>

    <div
      id="nav-menu"
      class="absolute left-1/2 -translate-x-1/2 hidden md:flex items-center gap-2 uppercase tracking-widest text-[11px] font-sans h-full">
      <div
        id="nav-highlight"
        class="absolute left-0 h-[34px] rounded-full custom-glass-highlight z-0 pointer-events-none opacity-0 transition-all duration-500 ease-[cubic-bezier(0.25,1,0.5,1)]">
      </div>
      <a href="/"
         th:class="${currentPath == '/'} ? 'nav-link relative z-10 px-5 py-2 flex items-center justify-center transition-colors duration-300 active-nav text-text-color opacity-100 font-bold' : 'nav-link relative z-10 px-5 py-2 flex items-center justify-center transition-colors duration-300 text-text-color opacity-60 hover:opacity-100 font-semibold'">Home</a>
      <a href="/articles"
         th:class="${#strings.startsWith(currentPath, '/articles')} ? 'nav-link relative z-10 px-5 py-2 flex items-center justify-center transition-colors duration-300 active-nav text-text-color opacity-100 font-bold' : 'nav-link relative z-10 px-5 py-2 flex items-center justify-center transition-colors duration-300 text-text-color opacity-60 hover:opacity-100 font-semibold'">Articles</a>
      <a href="/project"
         th:class="${#strings.startsWith(currentPath, '/project')} ? 'nav-link relative z-10 px-5 py-2 flex items-center justify-center transition-colors duration-300 active-nav text-text-color opacity-100 font-bold' : 'nav-link relative z-10 px-5 py-2 flex items-center justify-center transition-colors duration-300 text-text-color opacity-60 hover:opacity-100 font-semibold'">Projects</a>
      <a href="/about"
         th:class="${#strings.startsWith(currentPath, '/about')} ? 'nav-link relative z-10 px-5 py-2 flex items-center justify-center transition-colors duration-300 active-nav text-text-color opacity-100 font-bold' : 'nav-link relative z-10 px-5 py-2 flex items-center justify-center transition-colors duration-300 text-text-color opacity-60 hover:opacity-100 font-semibold'">About</a>
    </div>

    <div class="ml-auto z-10 flex items-center gap-1 md:gap-1">
      <a
        href="https://github.com/2hnk"
        target="_blank"
        rel="noopener noreferrer"
        class="nav-icon-btn nav-icon-github hidden md:flex w-9 h-9 items-center justify-center rounded-full text-text-color opacity-60 hover:opacity-100 transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
          <path d="M9 18c-4.51 2-5-2-7-2"></path>
        </svg>
      </a>

      <a
        href="https://instagram.com"
        target="_blank"
        rel="noopener noreferrer"
        class="nav-icon-btn nav-icon-instagram hidden md:flex w-9 h-9 items-center justify-center rounded-full text-text-color opacity-60 hover:opacity-100 transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
        </svg>
      </a>

      <button
        id="theme-toggle"
        class="nav-icon-btn nav-icon-theme w-9 h-9 flex items-center justify-center rounded-full text-text-color opacity-60 hover:opacity-100 transition-all duration-300"
        type="button">
        <span class="material-symbols-outlined text-[18px] transition-transform duration-500 ease-[cubic-bezier(0.25,1,0.5,1)]"
              id="theme-icon">light_mode</span>
      </button>

      <button
        id="mobile-menu-toggle"
        class="md:hidden w-8 h-8 flex items-center justify-center text-text-color opacity-70 hover:opacity-100 transition-opacity duration-300"
        aria-label="Toggle Menu"
        type="button">
        <span class="material-symbols-outlined text-[24px]" id="mobile-menu-icon">menu</span>
      </button>
    </div>
  </div>

  <div
    id="mobile-menu"
    class="absolute top-16 left-0 w-full glass-panel border-b-0 overflow-hidden flex flex-col transition-all duration-500 ease-out h-0 pointer-events-none opacity-0">
    <div class="flex flex-col p-6 gap-4">
      <a href="/"
         th:class="${currentPath == '/'} ? 'text-2xl font-serif font-bold uppercase transition-colors duration-300 text-accent-color' : 'text-2xl font-serif font-bold uppercase transition-colors duration-300 text-text-color opacity-70 hover:opacity-100'">Home</a>
      <a href="/articles"
         th:class="${#strings.startsWith(currentPath, '/articles')} ? 'text-2xl font-serif font-bold uppercase transition-colors duration-300 text-accent-color' : 'text-2xl font-serif font-bold uppercase transition-colors duration-300 text-text-color opacity-70 hover:opacity-100'">Articles</a>
      <a href="/project"
         th:class="${#strings.startsWith(currentPath, '/project')} ? 'text-2xl font-serif font-bold uppercase transition-colors duration-300 text-accent-color' : 'text-2xl font-serif font-bold uppercase transition-colors duration-300 text-text-color opacity-70 hover:opacity-100'">Projects</a>
      <a href="/about"
         th:class="${#strings.startsWith(currentPath, '/about')} ? 'text-2xl font-serif font-bold uppercase transition-colors duration-300 text-accent-color' : 'text-2xl font-serif font-bold uppercase transition-colors duration-300 text-text-color opacity-70 hover:opacity-100'">About</a>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const themeToggleBtn = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");

      if (!themeIcon) return;

      const isDark = document.documentElement.classList.contains("dark");
      themeIcon.textContent = isDark ? "dark_mode" : "light_mode";

      themeToggleBtn?.addEventListener("click", () => {
        const element = document.documentElement;
        element.classList.toggle("dark");
        const darkNow = element.classList.contains("dark");
        localStorage.setItem("theme", darkNow ? "dark" : "light");
        themeIcon.textContent = darkNow ? "dark_mode" : "light_mode";
      });

      const mobileBtn = document.getElementById("mobile-menu-toggle");
      const mobileIcon = document.getElementById("mobile-menu-icon");
      const mobileMenu = document.getElementById("mobile-menu");

      if (mobileBtn && mobileMenu && mobileIcon) {
        let isMenuOpen = false;

        mobileBtn.addEventListener("click", () => {
          isMenuOpen = !isMenuOpen;

          if (isMenuOpen) {
            mobileIcon.textContent = "close";
            mobileMenu.classList.remove("opacity-0", "pointer-events-none", "h-0");
            mobileMenu.classList.add("opacity-100", "pointer-events-auto");
            mobileMenu.style.height = "auto";
          } else {
            mobileIcon.textContent = "menu";
            mobileMenu.classList.add("opacity-0", "pointer-events-none", "h-0");
            mobileMenu.classList.remove("opacity-100", "pointer-events-auto");
            mobileMenu.style.height = "0";
          }
        });

        document.querySelectorAll("#mobile-menu a").forEach((link) => {
          link.addEventListener("click", () => {
            if (isMenuOpen) mobileBtn.click();
          });
        });
      }

      const navMenu = document.getElementById("nav-menu");
      const navHighlight = document.getElementById("nav-highlight");
      const navItems = document.querySelectorAll("#nav-menu .nav-link");

      if (navMenu && navHighlight && navItems.length > 0) {
        const activeItem = navMenu.querySelector(".active-nav");

        const moveNavHighlight = (el) => {
          navHighlight.style.width = `${el.offsetWidth}px`;
          navHighlight.style.transform = `translateX(${el.offsetLeft}px)`;
          navHighlight.style.opacity = "1";
        };

        if (activeItem) {
          setTimeout(() => moveNavHighlight(activeItem), 50);
        }

        navItems.forEach((item) => {
          item.addEventListener("mouseenter", () => moveNavHighlight(item));
        });

        navMenu.addEventListener("mouseleave", () => {
          if (activeItem) {
            moveNavHighlight(activeItem);
          } else {
            navHighlight.style.opacity = "0";
          }
        });

        window.addEventListener("resize", () => {
          if (activeItem) {
            moveNavHighlight(activeItem);
          }
        });
      }
    });
  </script>
</header>
</body>
</html>
