<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="topics(topics, articleCount, currentCat, currentSub)"
     class="w-full h-auto flex flex-col pl-4 reveal-up stagger-1"
     style="padding-right: 8px;">
  <h2
    class="text-[12px] font-bold tracking-[0.15em] uppercase text-text-color opacity-60 mb-8 text-right pr-2"
    style="margin-bottom: 16px;">
    TOPICS
  </h2>
  <div class="relative flex flex-col gap-1 pb-2 pr-[2px]" id="cat-list-container">
    <div class="absolute right-0 top-3 bottom-0 w-[1px] bg-border-color/20 pointer-events-none z-0"></div>

    <div
      id="grid-highlight"
      class="absolute -right-[3.5px] w-[calc(100%-12px)] rounded-[1.2rem] custom-glass-highlight z-20 pointer-events-none opacity-0 flex items-center justify-end pr-0 transition-all duration-400 ease-[cubic-bezier(0.25,1,0.5,1)]">
    </div>

    <a
      href="/articles"
      data-filter="all"
      th:class="${currentCat == null} ? 'cat-filter relative z-10 w-full flex items-center justify-end pr-[24px] py-2.5 cursor-pointer active-item outline-none focus:outline-none border-none ring-0 appearance-none bg-transparent text-[#1e66f5] dark:text-[#89b4fa] opacity-100 font-bold transition-colors duration-300 group/btn font-sans' : 'cat-filter relative z-10 w-full flex items-center justify-end pr-[24px] py-2.5 cursor-pointer outline-none focus:outline-none border-none ring-0 appearance-none bg-transparent text-text-color opacity-40 hover:opacity-100 transition-opacity duration-300 font-sans font-medium group/btn'">
      <span class="text-[13px] text-right flex items-center gap-1.5 leading-none">
        All <span class="text-[10px] font-bold opacity-60" th:text="${articleCount}">0</span>
      </span>
      <span
        class="inactive-dot absolute right-[-3.5px] top-1/2 -translate-y-1/2 w-[8px] h-[8px] rounded-full bg-black/20 dark:bg-white/20 transition-all duration-300 group-hover/btn:bg-black/40 dark:group-hover/btn:bg-white/40 z-10"></span>
    </a>

    <div th:each="topic : ${topics}"
         class="category-group group/cat flex flex-col gap-1 w-full"
         th:attr="data-group-cat=${topic.name}">
      <a
        th:href="@{/articles(cat=${topic.name})}"
        th:attr="data-filter-cat=${topic.name}"
        th:class="${topic.name == currentCat && currentSub == null} ? 'cat-filter relative z-10 w-full flex items-center justify-end pr-[24px] py-2.5 cursor-pointer active-item outline-none focus:outline-none border-none ring-0 appearance-none bg-transparent text-[#1e66f5] dark:text-[#89b4fa] opacity-100 font-bold transition-colors duration-300 group/btn font-sans' : 'cat-filter relative z-10 w-full flex items-center justify-end pr-[24px] py-2.5 cursor-pointer outline-none focus:outline-none border-none ring-0 appearance-none bg-transparent text-text-color opacity-40 hover:opacity-100 transition-opacity duration-300 font-sans font-medium group/btn'">
        <span class="text-[13px] text-right flex items-center gap-1.5 leading-none">
          <span th:text="${topic.name}">Network</span>
          <span class="text-[10px] font-bold opacity-60" th:text="${topic.count}">0</span>
        </span>
        <span class="inactive-dot absolute right-[-3.5px] top-1/2 -translate-y-1/2 w-[8px] h-[8px] rounded-full bg-black/20 dark:bg-white/20 transition-all duration-300 group-hover/btn:bg-black/40 dark:group-hover/btn:bg-white/40 z-10"></span>
      </a>

      <div th:if="${!#lists.isEmpty(topic.subcategories)}"
           th:class="${topic.name == currentCat} ? 'sub-list flex-col gap-1 flex group-hover/cat:flex' : 'sub-list flex-col gap-1 hidden group-hover/cat:flex'">
        <a th:each="sub : ${topic.subcategories}"
           th:href="@{/articles(cat=${topic.name},sub=${sub.name})}"
           th:attr="data-filter-cat=${topic.name},data-filter-sub=${sub.name}"
           th:class="${topic.name == currentCat && sub.name == currentSub} ? 'cat-filter relative z-10 w-full flex items-center justify-end pr-[24px] py-1.5 cursor-pointer pl-6 active-item outline-none focus:outline-none border-none ring-0 appearance-none bg-transparent text-[#1e66f5] dark:text-[#89b4fa] opacity-100 font-bold transition-colors duration-300 group/btn font-sans' : 'cat-filter relative z-10 w-full flex items-center justify-end pr-[24px] py-1.5 cursor-pointer pl-6 outline-none focus:outline-none border-none ring-0 appearance-none bg-transparent text-text-color opacity-40 hover:opacity-100 transition-opacity duration-300 font-sans font-medium group/btn'">
          <span class="text-[11px] text-right opacity-80 flex items-center gap-1.5 leading-none">
            <span th:text="${sub.name}">Wireshark Lab</span>
            <span class="text-[9px] font-bold opacity-60" th:text="${sub.count}">0</span>
          </span>
        </a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("cat-list-container");
      const highlight = document.getElementById("grid-highlight");
      const itemSelector = ".cat-filter";
      if (!container || !highlight) return;

      let activeItem =
        container.querySelector(`${itemSelector}.active-item`) ||
        container.querySelector(itemSelector);

      const removeActiveText = (el) => {
        el.classList.remove("text-[#1e66f5]", "dark:text-[#89b4fa]", "opacity-100", "font-bold");
        el.classList.add("text-text-color", "opacity-40", "font-medium");
      };
      const addActiveText = (el) => {
        el.classList.remove("text-text-color", "opacity-40", "font-medium");
        el.classList.add("text-[#1e66f5]", "dark:text-[#89b4fa]", "opacity-100", "font-bold");
      };

      const targetHeight = 32;
      const move = (el) => {
        const topOffset = el.offsetTop + (el.offsetHeight - targetHeight) / 2;
        highlight.style.height = `${targetHeight}px`;
        highlight.style.transform = `translateY(${topOffset}px)`;
        highlight.style.opacity = "1";
        container.querySelectorAll(itemSelector).forEach((btn) => removeActiveText(btn));
        addActiveText(el);
      };

      if (activeItem) move(activeItem);

      container.querySelectorAll(itemSelector).forEach((item) => {
        item.addEventListener("mouseenter", () => move(item));
        item.addEventListener("click", () => {
          activeItem = item;
          move(item);
        });
      });

      container.addEventListener("mouseleave", () => {
        if (activeItem) {
          move(activeItem);
        } else {
          highlight.style.opacity = "0";
        }
      });

      window.addEventListener("resize", () => {
        if (activeItem && container.offsetParent !== null) move(activeItem);
      });

      document.addEventListener("update-sliders", () => {
        if (activeItem && container.offsetParent !== null) move(activeItem);
      });
    });
  </script>
</div>
</body>
</html>
